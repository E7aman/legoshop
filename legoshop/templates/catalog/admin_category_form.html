{% extends "base.html" %}
{% block title %}{{ action }} Category — Admin{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header">
    <div><h1>{{ action }} Category</h1></div>
    <a href="{% url 'catalog:admin_category_list' %}" class="btn btn-ghost">← Back</a>
  </div>
  <div style="max-width:520px">
    <div class="form-card">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label>{{ field.label }}</label>
          {{ field }}
          {% for error in field.errors %}<div class="form-error">{{ error }}</div>{% endfor %}
        </div>
        {% endfor %}
        <div class="form-actions">
          <button type="submit" class="btn btn-dark">Save</button>
          <a href="{% url 'catalog:admin_category_list' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

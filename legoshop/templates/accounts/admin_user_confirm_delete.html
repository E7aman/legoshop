{% extends "base.html" %}
{% block title %}Delete User{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;padding-top:3rem">
  <div class="form-card">
    <h2 style="font-size:1.25rem;font-weight:800;margin-bottom:0.5rem">Delete "{{ edited_user.username }}"?</h2>
    <p class="text-muted" style="margin-bottom:2rem">This permanently deletes the user and all their data.</p>
    <form method="post" class="form-actions">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{% url 'accounts:admin_users' %}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
